name: CI/CD

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 lab6/habit-tracker/app/ lab6/habit-tracker/tests/ --max-line-length=100 --ignore=E501,W503

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: habit_pass
          POSTGRES_USER: habit_user
          POSTGRES_DB: habit_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r lab6/habit-tracker/requirements.txt -r lab6/habit-tracker/requirements-test.txt
      - name: Set DATABASE_URL for tests
        run: |
          echo "DATABASE_URL=postgresql://habit_user:habit_pass@localhost:5432/habit_db" >> $GITHUB_ENV
      - name: Run tests with coverage
        run: pytest lab6/habit-tracker/tests/ -v --cov=lab6/habit-tracker/app --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: lab6/habit-tracker
          push: false
          tags: habit-tracker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (optional)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        run: echo "Add your deploy step here (SSH, Render, Railway, etc.)"
