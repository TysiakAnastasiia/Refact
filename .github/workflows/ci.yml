name: CI/CD

on:
  push:
    branches: [main, dev, develop]
  pull_request:
    branches: [main, dev, develop]
  workflow_dispatch: {}

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install flake8
        run: pip install flake8
      - name: Run flake8
        run: flake8 lab6/habit-tracker/app/ lab6/habit-tracker/tests/ --max-line-length=100 --ignore=E501,W503

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: habit_pass
          POSTGRES_USER: habit_user
          POSTGRES_DB: habit_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r lab6/habit-tracker/requirements.txt -r lab6/habit-tracker/requirements-test.txt
      - name: Set DATABASE_URL for tests
        run: |
          echo "DATABASE_URL=postgresql://habit_user:habit_pass@localhost:5432/habit_db" >> $GITHUB_ENV
      - name: Run tests with coverage
        run: pytest lab6/habit-tracker/tests/ -v --cov=lab6/habit-tracker/app --cov-report=xml --cov-report=term-missing
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: lab6/habit-tracker
          push: false
          tags: "habit-tracker:${{ github.sha }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy (optional)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to server
        run: echo "Add your deploy step here (SSH, Render, Railway, etc.)"

  backend-lint-test:
    name: Backend - Lint and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bookswap
          POSTGRES_PASSWORD: bookswap
          POSTGRES_DB: bookswap_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt aiosqlite

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app/ --select E,W,F

      - name: Run unit tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://bookswap:bookswap@localhost:5432/bookswap_test
          SECRET_KEY: test-secret-key
          ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
        run: pytest tests/unit/ -v --cov=app --cov-report=xml

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          SECRET_KEY: test-secret-key
          ANTHROPIC_API_KEY: "${{ secrets.ANTHROPIC_API_KEY }}"
        run: pytest tests/integration/ -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml

  frontend-lint-test:
    name: Frontend - Lint and Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npm run test -- --run

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000/api
          VITE_WS_URL: ws://localhost:8000/ws
        run: npm run build

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: "docker build ./backend -t bookswap-backend:${{ github.sha }}"

      - name: Build frontend image
        run: "docker build ./frontend -t bookswap-frontend:${{ github.sha }}"

      - name: Smoke test with docker-compose
        run: |
          cp backend/.env.example backend/.env
          cp frontend/.env.example frontend/.env
          docker-compose up -d db backend
          sleep 10
          curl --fail http://localhost:8000/health || exit 1
          docker-compose down