name: BookSwap CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: 🐍 Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: bookswap
          POSTGRES_PASSWORD: bookswap
          POSTGRES_DB: bookswap_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt aiosqlite

      - name: Lint with ruff
        working-directory: backend
        run: ruff check app/ --select E,W,F

      - name: Run unit tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://bookswap:bookswap@localhost:5432/bookswap_test
          SECRET_KEY: test-secret-key
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/unit/ -v --cov=app --cov-report=xml

      - name: Run integration tests
        working-directory: backend
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          SECRET_KEY: test-secret-key
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/integration/ -v

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml

  frontend-lint-test:
    name: ⚛️ Frontend — Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npm run test -- --run

      - name: Build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: http://localhost:8000/api
          VITE_WS_URL: ws://localhost:8000/ws
        run: npm run build

  docker-build:
    name: 🐳 Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend-lint-test, frontend-lint-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend -t bookswap-backend:${{ github.sha }}

      - name: Build frontend image
        run: docker build ./frontend -t bookswap-frontend:${{ github.sha }}

      - name: Smoke test with docker-compose
        run: |
          cp backend/.env.example backend/.env
          cp frontend/.env.example frontend/.env
          docker-compose up -d db backend
          sleep 10
          curl --fail http://localhost:8000/health || exit 1
          docker-compose down
