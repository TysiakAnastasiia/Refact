version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-habit_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-habit_pass}
      POSTGRES_DB: ${POSTGRES_DB:-habit_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-habit_user} -d ${POSTGRES_DB:-habit_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-habit_user}:${POSTGRES_PASSWORD:-habit_pass}@db:5432/${POSTGRES_DB:-habit_db}
    depends_on:
      db:
        condition: service_healthy

  test:
    build:
      context: .
      dockerfile: Dockerfile.test
    profiles: ["test"]
    environment:
      DATABASE_URL: sqlite:///./test.db
    depends_on:
      - db

volumes:
  postgres_data:
